<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诗词宇宙</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="universe-container"></div>

<div id="landing-overlay">
  <div class="landing-content">
    <h1 class="landing-title">诗词宇宙</h1>
    <p class="landing-hint">✦ 双击打开 ✦</p>
  </div>
</div>

<div id="universe-ui" class="hidden">
  <div class="ui-top-bar">
    <div class="ui-logo">✦ 诗词宇宙</div>
    <button class="ui-btn" id="btnBack">← 返回</button>
  </div>
  <div class="ui-star-count" id="starCount">✨ 0 / 30</div>
</div>

<div id="poem-modal" class="modal hidden">
  <div class="modal-backdrop"></div>
  <div class="modal-content">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-body">
      <div class="poem-intro" id="poemIntro"></div>
      <h2 class="poem-title" id="poemTitle"></h2>
      <div class="poem-author-line" id="poemAuthorLine"></div>
      <div class="poem-divider"><span>◇</span><span>◇</span><span>◇</span></div>
      <div class="poem-text" id="poemText"></div>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="three.min.js"></script>
<script src="poems.js"></script>
<script src="main.js"></script>
</body>
</html>
